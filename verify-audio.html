<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Audio-Kontrolle</title>
<style>
body{font-family:'Jost',system-ui,sans-serif;background:#F2EDE2;color:#2C3830;padding:32px;max-width:560px;margin:0 auto}
h1{font-weight:300}h2{font-weight:400;margin-top:28px}
.row{display:flex;align-items:center;gap:14px;padding:9px 12px;border:1px solid rgba(0,0,0,.08);border-radius:12px;background:#FAF6EE;margin:8px 0}
.row .w{flex:1;font-size:17px}.row .i{font-size:11px;opacity:.5;width:60px}
button{background:#6FA898;color:#fff;border:none;border-radius:999px;width:42px;height:42px;font-size:16px;cursor:pointer}
.note{font-size:12px;opacity:.6;line-height:1.6}
</style></head><body>
<h1>🎙️ Audio-Kontrolle</h1>
<p class="note">Tippe ▶ und prüfe, ob das richtige Wort kommt (gleiche Reihenfolge wie in der App). „Hoi" ist sehr kurz — besonders prüfen.</p>
<div id="app"></div>
<script>
const L={1:["Grüezi","Hoi","Sali Zäme","Guete Morge","Schöne Abig","Guet Nacht","Tschau","Adiä / Adjö","Uf Widerseh","Uf Widerluege"],
        2:["Eis","Zwai","Drüü","Vier","Foif","Sächs","Sibä","Acht","Nüün","Zää"]};
const titles={1:"hi, bye",2:"numbers"};
let html="";
for(const lid of [1,2]){
  html+=`<h2>${titles[lid]} (Lektion ${lid})</h2>`;
  L[lid].forEach((w,i)=>{
    html+=`<div class="row"><span class="i">${lid}/${i}</span><span class="w">${w}</span>
      <button onclick="new Audio('audio/${lid}/${i}.mp3').play()">▶</button></div>`;
  });
}
document.getElementById('app').innerHTML=html;
</script></body></html>
