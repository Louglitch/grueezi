<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>category tiles — current vs proposed</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:#3a3a3a;padding:24px;color:#fff}
h1{font-weight:400;font-size:18px;margin-bottom:4px}
.sub{font-size:13px;opacity:.7;margin-bottom:20px}
.row{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start}
.panel{border-radius:18px;padding:18px;width:340px}
.panel h2{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;opacity:.85}
.modewrap{margin-bottom:30px}
.modetitle{font-size:14px;font-weight:500;margin-bottom:10px;letter-spacing:.04em}

/* page surfaces per mode */
.mint{background:#F2EDE2}
.pink{background:#FAF6EE}
.dark{background:#1A1A1C}
.mint h2{color:#2C3830}.pink h2{color:#2A2A35}.dark h2{color:#EDE8DF}

/* ---- category tile component (copied from app) ---- */
.cat-grid{display:flex;flex-direction:column;gap:10px}
.cat-card{display:flex;align-items:center;gap:14px;padding:12px 15px;border-radius:14px;background:var(--tile);color:var(--ink);filter:drop-shadow(0 2px 6px rgba(44,56,48,.10))}
.cat-st{width:46px;height:46px;flex-shrink:0;border-radius:6px;display:flex;align-items:center;justify-content:center;background:var(--stamp);border:1.4px solid var(--st-edge);background-image:radial-gradient(circle at 5px 5px,transparent 2.4px,var(--stamp) 3px);color:var(--stampink)}
.cat-ic{display:flex;align-items:center;justify-content:center}
.cat-ic svg{width:24px;height:24px;stroke-width:1.7;fill:none;stroke:currentColor}
.cat-ic svg text{fill:currentColor;stroke:none}
.cat-body{flex:1;min-width:0}
.cat-name{font-size:16px;font-weight:500;letter-spacing:.02em;color:var(--ink);margin-bottom:2px}
.cat-meta{font-size:11px;font-weight:300;color:var(--ink);opacity:.65}
.cat-bar{width:48px;height:4px;border-radius:99px;background:color-mix(in srgb,var(--ink) 16%,transparent);overflow:hidden;flex-shrink:0}
.cat-bar span{display:block;height:100%;border-radius:99px;background:var(--ink);opacity:.55}

/* ===== CURRENT values ===== */
.mint .cur .cat-grid{--tile:#BFD8CC;--ink:#2C3830;--stamp:#F2EDE2;--stampink:#2C3830;--st-edge:#C4B89E}
.pink .cur .cat-grid{--tile:#D98BAD;--ink:#FBF4F7;--stamp:#FAF0F4;--stampink:#7A3040;--st-edge:#C98BA6}
.dark .cur .cat-grid{--tile:#A8C8BC;--ink:#1E2A24;--stamp:#F2EDE2;--stampink:#2C3830;--st-edge:#7FA192}

/* ===== PROPOSED — neutral cream in light modes, dark in dark mode ===== */
.mint .new .cat-grid{--tile:#FFFFFF;--ink:#2C3830;--stamp:#F2EDE2;--stampink:#6FA898;--st-edge:#C4B89E}
.pink .new .cat-grid{--tile:#FFFFFF;--ink:#2A2A35;--stamp:#FAF0F4;--stampink:#D4788A;--st-edge:#E3C3D2}
.dark .new .cat-grid{--tile:#2E2E33;--ink:#EDE8DF;--stamp:#1C1C1F;--stampink:#A8C8BC;--st-edge:#4A4A50}
</style></head>
<body>
<h1>Category tiles — current vs proposed</h1>
<div class="sub">Words / Phrases / Grammar / Wissen / Einbürgerung · proposal: tiles → cream (mint &amp; pink), dark (dark)</div>
<div id="mount"></div>
<script>
const ICONS={
 words:'<svg viewBox="0 0 24 24"><text x="12" y="17" text-anchor="middle" font-size="15" font-weight="500" fill="currentColor" stroke="none">Aa</text></svg>',
 phrases:'<svg viewBox="0 0 24 24"><path d="M14 9a2 2 0 0 1-2 2H7l-3 3V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2z"/><path d="M10 12.5a2 2 0 0 0 2 2h5l3 3V11a2 2 0 0 0-2-2"/></svg>',
 gram:'<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="10" x2="9" y2="20"/></svg>',
 info:'<svg viewBox="0 0 24 24"><path d="M12 7v14M3 5h6a3 3 0 0 1 3 3 3 3 0 0 1 3-3h6v13h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3H3z"/></svg>',
 einb:'<svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="10" r="3"/><path d="M9 16h6"/></svg>'
};
const CATS=[
 {ic:'words',name:'Wörter',meta:'10 Lektionen · 3 erledigt',pct:30},
 {ic:'phrases',name:'Sätze',meta:'8 Lektionen · 1 erledigt',pct:12},
 {ic:'gram',name:'Grammatik',meta:'5 Tabälle · 0 erledigt',pct:0},
 {ic:'info',name:'Wissen',meta:'9 Artikel · 2 erledigt',pct:22},
 {ic:'einb',name:'Einbürgerung',meta:'Test · 30 Fragen',pct:0}
];
function grid(){
 const g=document.createElement('div');g.className='cat-grid';
 CATS.forEach(c=>{
  const card=document.createElement('div');card.className='cat-card';
  card.innerHTML=`<div class="cat-st"><div class="cat-ic">${ICONS[c.ic]}</div></div>
   <div class="cat-body"><div class="cat-name">${c.name}</div><div class="cat-meta">${c.meta}</div></div>
   <div class="cat-bar"><span style="width:${c.pct}%"></span></div>`;
  g.appendChild(card);
 });
 return g;
}
const mount=document.getElementById('mount');
[['mint','MINT MODE'],['pink','PINK MODE'],['dark','DARK MODE']].forEach(([mode,title])=>{
 const w=document.createElement('div');w.className='modewrap '+mode;
 w.innerHTML=`<div class="modetitle" style="color:${mode==='dark'?'#EDE8DF':'#2C3830'}">${title}</div>`;
 const row=document.createElement('div');row.className='row';
 [['cur','CURRENT'],['new','PROPOSED']].forEach(([cls,lab])=>{
  const p=document.createElement('div');p.className='panel '+cls+' '+mode;
  p.innerHTML=`<h2>${lab}</h2>`;
  p.appendChild(grid());
  row.appendChild(p);
 });
 w.appendChild(row);mount.appendChild(w);
});
</script>
</body></html>
